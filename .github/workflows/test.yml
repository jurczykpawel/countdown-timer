name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd, pcntl
          coverage: none
      - name: Run unit tests
        run: bash tests/run.sh unit

  integration:
    name: Integration tests (live origin)
    runs-on: ubuntu-latest
    # Optional: only runs when secrets are configured. Skipped on PRs from
    # forks that don't have access to the TIMER_KEY secret.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        env:
          TIMER_URL: ${{ vars.TIMER_URL }}
          TIMER_KEY: ${{ secrets.TIMER_TEST_KEY }}
        run: |
          if [ -z "$TIMER_URL" ] || [ -z "$TIMER_KEY" ]; then
            echo "Skipping integration tests: TIMER_URL or TIMER_TEST_KEY not configured."
            exit 0
          fi
          bash tests/integration/test_http.sh
